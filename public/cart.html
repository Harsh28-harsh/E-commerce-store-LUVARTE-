<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="css/style.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>
    <header>
        <nav>
            <div class="nav container">
                <i class="ri-menu-2-line"></i>
                <a href="index.html" class="logo">Luvarte</a>
                <div class="navbar">
                    <a href="#products" class="nav-links">Shirts & Tops</a>
                    <a href="#products" class="nav-links">Outwear</a>
                    <a href="#products" class="nav-links">Trousers</a>
                    <a href="#products" class="nav-links">Caps</a>
                </div>
                <a href="cart.html">
                    <i class="ri-shopping-cart-2-line" id="cart-icon"><span id="cart-count">0</span></i>
                </a>
            </div>
        </nav>
    </header>

    <section class="cart-container container">
        <a href="index.html" class="back-homepage">
            <i class="ri-arrow-left-s-line"><span>Back To Home</span></i>
        </a>
        <h2 class="cart-s-title">Shopping Cart</h2>
        <div class="cart-box">
            <div class="cart-data">
                <div id="cartItems"></div>
            </div>
            <div class="cart-t">
                <div id="cartTotal"></div>
                <a href="#" class="checkout-btn">Checkout</a>
            </div>
        </div>
    </section>

   

    <script src="js/main.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/cart.js"></script>
    
</body>
</html>
